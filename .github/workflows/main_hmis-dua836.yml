# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Jekyll app to Azure Web App - hmis-dua836

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Configurar entorno Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Construir el blog con Jekyll
        run: |
          gem install bundler jekyll
          bundle install || echo "No hay Gemfile, seguimos adelante"
          jekyll build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-app
          path: _site/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: jekyll-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C8F153D1E2D946269CCFEBA6AAE75DB1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_ED4D4AC7D7F3412CAEE3AF51CC874FF7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E9A67794946D410990761F28A3DCF89B }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hmis-dua836'
          slot-name: 'Production'
          package: .