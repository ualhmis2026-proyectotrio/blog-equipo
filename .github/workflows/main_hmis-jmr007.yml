# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Jekyll app to Azure Web App - hmis-jmr007

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      # 1. Instalamos Ruby 
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true # Instala las gems del Gemfile automáticamente

      # 2. Construimos el sitio usando los DOS archivos de configuración
      - name: Build with Jekyll
        run: |
          bundle exec jekyll build --config _config.yml,_config_azure.yml
        env:
          JEKYLL_ENV: production

      # 3. Subimos la carpeta _site generada
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-site  # Nombre unificado
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: jekyll-site  # ¡Ahora descargamos el mismo que subimos!
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DB434719761140A7AA0EA0A977FDA87A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_854AA050FD364E4BB26FBFFEF9D4C08F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9ABA9C1AA03C48E8978C5C239B0D8803 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hmis-jmr007'
          slot-name: 'Production'
          package: .